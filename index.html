<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa CrossFit Mooca</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #111111;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 64px; height: 64px;
    background: #00A651;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  .sub { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 28px; }
  .btn {
    display: block;
    background: #00A651;
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    padding: 16px 24px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .instrucao {
    background: #2a2a2a;
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    text-align: left;
    margin-top: 8px;
  }
  .instrucao strong { color: #fff; }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .step:last-child { margin-bottom: 0; }
  .num {
    background: #00A651;
    color: #fff;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">💪</div>
  <h1>Pesquisa CrossFit Mooca</h1>
  <p class="sub">Sua opinião constrói o futuro do box.</p>

  <a class="btn" href="https://script.google.com/macros/s/AKfycbx1acTs4hKF0qONf-UzTGlX2ZWMpyJA_51J4TzHtO5B82ou_lUlgm7cs_Xh9lTWVDbH/exec">
    Abrir o formulário →
  </a>

  <div class="instrucao">
    <div class="step">
      <div class="num">1</div>
      <div>Toque no botão verde acima</div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div>Se aparecer erro, toque nos <strong>três pontinhos ···</strong> no canto da tela</div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div>Escolha <strong>"Abrir no Safari"</strong> ou <strong>"Abrir no Chrome"</strong></div>
    </div>
  </div>
</div>
</body>
</html>
